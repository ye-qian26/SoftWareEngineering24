spring:
  application:
    name: agent-backend
    
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:agent}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com}
      chat:
        options:
          model: ${DASHSCOPE_MODEL:qwen-plus}
          temperature: 0.7

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:Y2hhdGJhY2tlbmRzZWNyZXRrZXlmb3JlbnRlc3RwdzEyMw==}
  expiration: ${JWT_EXPIRATION:86400000}

agent:
  tools:
    enabled: ${AGENT_TOOLS_ENABLED:true}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/*.xml

logging:
  level:
    com.agentbackend: debug
    org.springframework.ai: debug
